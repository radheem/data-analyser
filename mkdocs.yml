site_name: Data Analyzer
site_description: Political Ads Intelligence Hub & MCP Server
site_author: Radheem Bin Razi
site_url: https://radheem.github.io/data-analyser/

repo_name: radheem/data-analyser
repo_url: https://github.com/radheem/data-analyser
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/radheem/data-analyser

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Setup: SETUP.md
  - Demos: demos.md
