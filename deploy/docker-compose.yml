services:
  mcp-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    volumes:
      # Mount the JSON credentials file from the project root into the container
      - ../gcp-creds.json:/app/gcp-creds.json:ro
      # Mount the shared configuration directory for persistent Service Account Token
      - ./grafana/mcp-config:/app/mcp-config
    env_file:
      - ../.env
    environment:
      - MCP_TRANSPORT=sse
      - GRAFANA_API_URL=http://grafana:3000
      - GRAFANA_EXTERNAL_URL=http://localhost:3000
    ports:
      - "5001:5000"
    stdin_open: true
    tty: true

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/google-key.pem:/etc/grafana/google-key.pem:ro
    env_file:
      - ../.env
    environment:
      - GF_INSTALL_PLUGINS=grafana-bigquery-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ALLOW_EMBEDDING=true

  grafana-mcp:
    image: grafana/mcp-grafana:latest
    ports:
      - "8000:8000"
    volumes:
      - ./grafana/mcp-config:/app/mcp-config:ro
    environment:
      - GRAFANA_URL=http://grafana:3000
    entrypoint: ["/bin/bash", "-c"]
    command: ["while [ ! -f /app/mcp-config/token ]; do echo 'Waiting for service account token...'; sleep 1; done && export GRAFANA_SERVICE_ACCOUNT_TOKEN=$$(cat /app/mcp-config/token) && exec /app/mcp-grafana -t sse --address 0.0.0.0:8000"]
    depends_on:
      - grafana
      - mcp-server
